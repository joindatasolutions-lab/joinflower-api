<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PetalOps | Front Starter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="background-orb orb-a" aria-hidden="true"></div>
    <div class="background-orb orb-b" aria-hidden="true"></div>

    <main class="layout">
      <header class="hero reveal">
        <p class="eyebrow">JoinFlower API Playground</p>
        <h1>Front listo para conectar con tu backend FastAPI</h1>
        <p class="subtitle">
          Prueba salud, catálogo, barrios y cliente desde una UI simple.
        </p>
      </header>

      <section class="panel reveal delay-1">
        <label for="apiBase">Base URL del API</label>
        <div class="row">
          <input id="apiBase" type="text" value="http://127.0.0.1:8001" />
          <button id="btnPing" class="btn">Ping</button>
          <button id="btnHealth" class="btn btn-alt">Health</button>
        </div>
      </section>

      <section class="grid">
        <article class="panel reveal delay-2">
          <h2>Catalogo</h2>
          <div class="field">
            <label for="empresaCatalogo">Empresa ID</label>
            <input id="empresaCatalogo" type="number" value="1" min="1" />
          </div>
          <button id="btnCatalogo" class="btn">Consultar catalogo</button>
        </article>

        <article class="panel reveal delay-3">
          <h2>Barrios</h2>
          <div class="field">
            <label for="empresaBarrio">Empresa ID</label>
            <input id="empresaBarrio" type="number" value="1" min="1" />
          </div>
          <div class="field">
            <label for="sucursalBarrio">Sucursal ID</label>
            <input id="sucursalBarrio" type="number" value="1" min="1" />
          </div>
          <div class="field">
            <label for="queryBarrio">Busqueda</label>
            <input id="queryBarrio" type="text" value="ce" minlength="2" />
          </div>
          <button id="btnBarrios" class="btn">Buscar barrios</button>
        </article>

        <article class="panel reveal delay-4">
          <h2>Cliente</h2>
          <div class="field">
            <label for="empresaCliente">Empresa ID</label>
            <input id="empresaCliente" type="number" value="1" min="1" />
          </div>
          <div class="field">
            <label for="identCliente">Identificacion</label>
            <input id="identCliente" type="text" value="123456" />
          </div>
          <button id="btnCliente" class="btn">Buscar cliente</button>
        </article>
      </section>

      <section class="panel reveal delay-5">
        <h2>Resultado</h2>
        <pre id="output">Sin consultas todavia.</pre>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
